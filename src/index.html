<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Detector Verification</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .transition-box { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-100 min-h-screen">

    <header class="flex justify-between items-center px-8 py-4 bg-white dark:bg-darkCard shadow-sm sticky top-0 z-50 transition-box border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-3">
            <div class="bg-primary text-white p-2 rounded-lg">
                <i class="fa-solid fa-hard-hat text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wide">PPE<span class="text-primary font-normal">Detector</span></h1>
        </div>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors focus:outline-none" title="Toggle Dark/Light Mode">
            <i id="themeIcon" class="fa-solid fa-eye text-xl text-gray-600 dark:text-gray-300"></i>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">
        
        <div id="dropzone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 bg-white dark:bg-darkCard rounded-2xl p-10 text-center hover:border-primary dark:hover:border-primary transition-box relative overflow-hidden group">
            <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" accept="image/*">
            
            <div id="uploadPrompt" class="space-y-4 pointer-events-none transition-box">
                <div class="inline-block p-4 rounded-full bg-blue-50 dark:bg-blue-900/30 text-primary mb-2 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl"></i>
                </div>
                <h3 class="text-xl font-semibold">Upload Image</h3>
                <p class="text-gray-500 dark:text-gray-400">Drag & drop an image, click to browse, or paste <kbd class="px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded border dark:border-gray-700 font-mono text-xs">Ctrl+V</kbd></p>
            </div>

            <div id="previewContainer" class="hidden absolute inset-0 bg-black/5 dark:bg-black/40 flex items-center justify-center z-10 p-2">
                <img id="imagePreview" class="max-h-full max-w-full rounded shadow-md hidden object-contain" />
                <button id="removeMedia" class="absolute top-4 right-4 bg-red-500 hover:bg-red-600 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-colors z-30" title="Remove Media">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-darkCard rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 transition-box">
            <div class="space-y-6">
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label for="confSlider" class="font-semibold text-gray-700 dark:text-gray-200">
                            <i class="fa-solid fa-sliders text-gray-400 mr-2"></i>Confidence Threshold
                        </label>
                        <span id="confValue" class="px-3 py-1 bg-blue-50 dark:bg-blue-900/30 text-primary font-mono font-bold rounded-lg border border-blue-100 dark:border-blue-800">
                            0.50
                        </span>
                    </div>
                    <input type="range" id="confSlider" min="0.0" max="1.0" step="0.01" value="0.5" 
                        class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700 accent-primary">
                </div>
                
                <button id="verifyBtn" class="w-full bg-primary hover:bg-blue-600 text-white text-lg font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg">
                    <i class="fa-solid fa-shield-halved"></i> Verify Compliance
                </button>
            </div>
        </div>

        <div id="resultsArea" class="hidden bg-white dark:bg-darkCard rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 transition-box">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 border-b border-gray-100 dark:border-gray-700 pb-3">
                <i class="fa-solid fa-chart-pie text-primary"></i> Verification Results
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Processed Output</h3>
                    <div class="bg-gray-100 dark:bg-gray-900 rounded-xl aspect-video flex items-center justify-center overflow-hidden border border-gray-200 dark:border-gray-700">
                        <img id="resultImage" class="max-h-full max-w-full object-contain hidden" />
                    </div>
                </div>
                
                <div class="space-y-3">
                    <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Detected Items</h3>
                    <div id="detectionList" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                        <!-- Items injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const imagePreview = document.getElementById('imagePreview');
        const removeMedia = document.getElementById('removeMedia');
        const confSlider = document.getElementById('confSlider');
        const confValue = document.getElementById('confValue');
        const verifyBtn = document.getElementById('verifyBtn');
        const resultsArea = document.getElementById('resultsArea');
        const resultImage = document.getElementById('resultImage');
        const detectionList = document.getElementById('detectionList');

        let currentFile = null;

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            themeIcon.className = html.classList.contains('dark') 
                ? 'fa-solid fa-eye-slash text-xl text-gray-300' 
                : 'fa-solid fa-eye text-xl text-gray-600';
        });

        confSlider.addEventListener('input', (e) => confValue.textContent = parseFloat(e.target.value).toFixed(2));

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Please upload a valid image file.');
                return;
            }
            currentFile = file;
            uploadPrompt.classList.add('hidden');
            previewContainer.classList.remove('hidden');
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.classList.remove('hidden');
            resultsArea.classList.add('hidden'); 
        }

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        removeMedia.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            currentFile = null; fileInput.value = '';
            previewContainer.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            imagePreview.src = '';
            resultsArea.classList.add('hidden');
        });

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-primary'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-primary'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault(); dropzone.classList.remove('border-primary');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        document.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].kind === 'file') { handleFile(items[i].getAsFile()); break; }
            }
        });

        verifyBtn.addEventListener('click', () => {
            if (!currentFile) { alert("Please upload an image first."); return; }

            const originalText = verifyBtn.innerHTML;
            verifyBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing Model...';
            verifyBtn.disabled = true;

            // --- REAL BACKEND FETCH ---
            const formData = new FormData();
            formData.append('file', currentFile);
            formData.append('confidence', confSlider.value);

            fetch('http://localhost:8000/detect', { 
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error("Server responded with an error.");
                return res.json();
            })
            .then(data => renderResults(data))
            .catch(err => {
                console.error(err);
                alert("Failed to connect to Python backend. Ensure 'uvicorn main:app' is running.");
            })
            .finally(() => {
                verifyBtn.innerHTML = originalText;
                verifyBtn.disabled = false;
            });
        });

        function renderResults(data) {
            resultsArea.classList.remove('hidden');
            setTimeout(() => resultsArea.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            
            resultImage.src = data.imageSrc;
            resultImage.classList.remove('hidden');

            detectionList.innerHTML = '';
            if (data.detections.length === 0) {
                detectionList.innerHTML = '<div class="p-4 bg-gray-50 dark:bg-gray-800 rounded-lg text-center text-gray-500">No objects detected.</div>';
                return;
            }

            data.detections.forEach(det => {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-4 rounded-xl border bg-green-50 border-green-200 text-green-800 dark:bg-green-900/20 dark:border-green-800 dark:text-green-300';
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-circle-check text-lg"></i>
                        <span class="font-bold tracking-wide">${det.class}</span>
                    </div>
                    <span class="font-mono bg-white dark:bg-black/30 px-2 py-1 rounded text-sm">${(det.conf * 100).toFixed(1)}%</span>
                `;
                detectionList.appendChild(item);
            });
        }
    </script>
</body>
</html>
